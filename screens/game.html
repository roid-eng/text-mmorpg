<div style="display:flex; flex-direction:column; min-height:100vh; max-width:640px; margin:0 auto; padding:16px; gap:12px;">

  <!-- Header -->
  <div class="panel" style="display:flex; justify-content:space-between; align-items:center;">
    <span class="amber-glow" style="letter-spacing:0.15em;">MYTHARION</span>
    <div id="stats" class="muted" style="font-size:0.8rem;"></div>
    <button class="btn" style="padding:4px 10px; font-size:0.75rem;" onclick="Auth.signOut()">Logout</button>
  </div>

  <!-- Game log -->
  <div class="log" id="game-log"></div>

  <!-- Action bar -->
  <div class="panel">
    <div class="panel-title">Actions</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
      <button class="btn" onclick="actionExplore()">[ Explore ]</button>
      <button class="btn" onclick="actionRest()">[ Rest ]</button>
      <button class="btn" onclick="actionInventory()">[ Inventory ]</button>
      <button class="btn" onclick="actionChat()">[ Chat ]</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="panel" id="chat-panel" style="display:none;">
    <div class="panel-title">Global Chat</div>
    <div class="log" id="chat-log" style="height:160px;"></div>
    <div style="display:flex; gap:8px; margin-top:10px;">
      <input type="text" id="chat-input" placeholder="Message..." style="flex:1;" onkeydown="if(event.key==='Enter') sendChat();" />
      <button class="btn" onclick="sendChat()">Send</button>
    </div>
  </div>

</div>
