<div style="display:flex; flex-direction:column; min-height:100vh; max-width:640px; margin:0 auto; padding:16px; gap:12px;">

  <!-- Header -->
  <div class="panel" style="display:flex; justify-content:space-between; align-items:center;">
    <span class="amber-glow" style="letter-spacing:0.15em;">MYTHARION</span>
    <div id="stats" class="muted" style="font-size:0.8rem;"></div>
    <button class="btn" style="padding:4px 10px; font-size:0.75rem;" onclick="Auth.signOut()">Logout</button>
  </div>

  <!-- Game log -->
  <div class="log" id="game-log"></div>

  <!-- Combat panel -->
  <div class="panel" id="combat-panel" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;">
      <span id="combat-monster-name" class="amber" style="font-size:1rem; letter-spacing:0.1em;"></span>
      <span id="combat-hp-text" class="muted" style="font-size:0.8rem;"></span>
    </div>
    <div class="stat-bar" style="margin-bottom:12px;">
      <div id="combat-hp-bar-fill" class="stat-bar-fill hp" style="width:100%;"></div>
    </div>
    <div class="log" id="combat-log" style="height:200px;"></div>
    <div id="skill-buttons" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;"></div>
    <div style="margin-top:8px;">
      <button class="btn btn-danger" onclick="Combat.retreat()">[ 후퇴 ]</button>
    </div>
  </div>

  <!-- Zone direction buttons (rendered dynamically by explore) -->
  <div class="panel" id="zone-actions" style="display:none;">
    <div class="panel-title">이동</div>
    <div id="zone-move-buttons" style="display:flex; flex-direction:column; gap:6px;"></div>
    <div id="zone-monster-panel" style="display:none; margin-top:12px;"></div>
  </div>

  <!-- Inventory panel -->
  <div class="panel" id="inventory-panel" style="display:none;">
    <div class="panel-title">[ 인벤토리 ]</div>
    <div id="inventory-list" style="display:flex; flex-direction:column; gap:4px;"></div>
  </div>

  <!-- Ranking panel -->
  <div class="panel" id="ranking-panel" style="display:none;">
    <div class="panel-title">[ 랭킹 ]</div>
    <div id="ranking-list" style="display:flex; flex-direction:column; gap:4px;"></div>
  </div>

  <!-- Action bar -->
  <div class="panel">
    <div class="panel-title">Actions</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
      <button class="btn" onclick="actionExplore()">[ Explore ]</button>
      <button class="btn" id="btn-rest" onclick="actionRest()">[ Rest ]</button>
      <button class="btn" onclick="actionInventory()">[ Inventory ]</button>
      <button class="btn" onclick="actionChat()">[ Chat ]</button>
      <button class="btn" style="grid-column: 1 / -1;" onclick="actionRanking()">[ Ranking ]</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="panel" id="chat-panel" style="display:none;">
    <div class="panel-title">Global Chat</div>
    <div class="log" id="chat-log" style="height:160px;"></div>
    <div style="display:flex; gap:8px; margin-top:10px;">
      <input type="text" id="chat-input" placeholder="Message..." style="flex:1;" onkeydown="if(event.key==='Enter') sendChat();" />
      <button class="btn" onclick="sendChat()">Send</button>
    </div>
  </div>

</div>
