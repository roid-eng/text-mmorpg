<div id="game-wrapper">

  <!-- 좌측: 스탯 패널 (PC만) -->
  <div id="stat-panel" class="panel side-panel">
    <div class="panel-title">HERO</div>
    <div id="stat-name" class="amber"></div>
    <div id="stat-class" class="muted"></div>
    <div id="stat-level"></div>
    <div style="margin-top:12px;">
      <div class="stat-label">HP</div>
      <div class="stat-bar"><div id="stat-hp-bar" class="stat-bar-fill hp" style="width:100%;"></div></div>
      <div id="stat-hp-text" class="muted"></div>
    </div>
    <div style="margin-top:8px;">
      <div class="stat-label">MP</div>
      <div class="stat-bar"><div id="stat-mp-bar" class="stat-bar-fill mp" style="width:100%;"></div></div>
      <div id="stat-mp-text" class="muted"></div>
    </div>
    <div style="margin-top:12px;" id="stat-gold"></div>
    <div id="stat-atk" class="muted"></div>
    <div style="margin-top:8px;">
      <div class="stat-label">EXP</div>
      <div class="stat-bar"><div id="stat-exp-bar" class="stat-bar-fill" style="background:var(--amber); width:0%;"></div></div>
      <div id="stat-exp-text" class="muted"></div>
    </div>
  </div>

  <!-- 중앙: 메인 영역 -->
  <div id="main-panel">

    <!-- 모바일 전용 헤더 (PC에선 숨김) -->
    <div id="mobile-header" class="panel">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="amber" style="font-size:1.1rem;">MYTHARION</span>
        <button class="btn" onclick="authLogout()" style="padding:4px 10px;">LOGOUT</button>
      </div>
      <div id="mobile-stat-text" class="muted" style="font-size:0.75rem; margin-top:4px;"></div>
    </div>

    <!-- 게임 로그 -->
    <div id="game-log" class="log panel"></div>

    <!-- 이동 버튼 -->
    <div id="zone-actions" class="panel" style="display:none;">
      <div class="panel-title">이동</div>
      <div id="zone-move-buttons" style="display:flex; flex-direction:column; gap:6px;"></div>
    </div>

    <!-- 인벤토리 패널 -->
    <div class="panel" id="inventory-panel" style="display:none;">
      <div class="panel-title">[ 인벤토리 ]</div>
      <div id="inventory-list" style="display:flex; flex-direction:column; gap:4px;"></div>
    </div>

    <!-- 랭킹 패널 -->
    <div class="panel" id="ranking-panel" style="display:none;">
      <div class="panel-title">[ 랭킹 ]</div>
      <div id="ranking-list" style="display:flex; flex-direction:column; gap:4px;"></div>
    </div>

    <!-- 채팅 패널 (모바일용) -->
    <div class="panel" id="chat-panel" style="display:none;">
      <div class="panel-title">Global Chat</div>
      <div class="log" id="chat-log" style="height:160px;"></div>
      <div style="display:flex; gap:8px; margin-top:10px;">
        <input type="text" id="chat-input" placeholder="Message..." style="flex:1;" onkeydown="if(event.key==='Enter') sendChat();" />
        <button class="btn" onclick="sendChat()">Send</button>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="panel">
      <div class="panel-title">Actions</div>
      <div class="actions-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <button class="btn" id="btn-explore" onclick="actionExplore()">[ Explore ]</button>
        <button class="btn" id="btn-rest" onclick="actionRest()">[ Rest ]</button>
        <button class="btn" style="grid-column:1/-1;" onclick="actionInventory()">[ Inventory ]</button>
        <button class="btn" id="btn-chat" onclick="actionChat()">[ Chat ]</button>
<button class="btn" style="grid-column:1/-1;" onclick="actionRanking()">[ Ranking ]</button>
      </div>
    </div>

  </div>

  <!-- 우측 컬럼 (PC만): 노드 맵 + 사이드 채팅 -->
  <div id="right-col" class="side-panel">

    <div id="map-panel" class="panel">
      <div class="panel-title">MAP</div>
      <canvas id="node-map" width="180" height="220"></canvas>
      <div id="map-zone-name" class="amber" style="text-align:center; margin-top:8px; font-size:0.8rem;"></div>
    </div>

    <div id="chat-side-panel" class="panel" style="margin-top:8px;">
      <div class="panel-title">GLOBAL CHAT</div>
      <div id="chat-side-log" class="log" style="height:160px; overflow-y:auto; font-size:0.75rem;"></div>
      <div style="display:flex; gap:6px; margin-top:6px;">
        <input id="chat-side-input" type="text" placeholder="Message..."
          style="flex:1; min-width:0; font-size:0.75rem; padding:6px 8px;"
          onkeydown="if(event.key==='Enter') sendSideChat()">
        <button class="btn" onclick="sendSideChat()" style="padding:6px 10px; font-size:0.75rem; flex-shrink:0;">✓</button>
      </div>
    </div>

  </div>

</div>
