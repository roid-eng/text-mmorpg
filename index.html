<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mytharion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="css/terminal.css" />
</head>
<body class="crt">
  <div id="app">
    <!-- Screen content injected by app.js -->
  </div>
  <!-- Monster selection modal -->
  <div id="monster-modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:var(--bg-panel); border:1px solid var(--amber-dim); padding:20px 24px; width:90%; max-width:480px; max-height:80vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <span class="amber" style="letter-spacing:0.1em;">[ 주변 몬스터 ]</span>
        <button class="btn" style="padding:2px 10px;" onclick="Game.closeMonsterModal()">[ X ]</button>
      </div>
      <div id="monster-modal-list"></div>
    </div>
  </div>

  <!-- Shop modal -->
  <div id="shop-modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:var(--bg-panel); border:1px solid var(--amber-dim); padding:20px 24px; width:90%; max-width:480px; max-height:80vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <span class="amber" style="letter-spacing:0.1em;">[ 상점 ]</span>
        <button class="btn" style="padding:2px 10px;" onclick="Game.closeShopModal()">[ X ]</button>
      </div>
      <div style="display:flex; gap:8px; margin-bottom:16px;">
        <button id="shop-tab-buy" class="btn shop-tab-active" onclick="Game.shopTab('buy')">[ 구매 ]</button>
        <button id="shop-tab-sell" class="btn" onclick="Game.shopTab('sell')">[ 매입 ]</button>
      </div>
      <div id="shop-buy-list" style="display:flex; flex-direction:column; gap:6px;"></div>
      <div id="shop-sell-list" style="display:none; flex-direction:column; gap:6px;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/character.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/game.js"></script>
  <script src="app.js"></script>
</body>
</html>
